<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Library - Dynamic Edition</title>
    <style>
        /* Variabili Colori */
        :root {
            --bg-1: #020205;
            --bg-2: #0a0a1a;
            --bg-3: #120520;
            --card-gradient: linear-gradient(-45deg, #ff0055, #8800ff, #0088ff, #00ffee, #ff8800);
        }

        /* 1. ANIMAZIONE BACKGROUND SITO */
        @keyframes siteBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(-45deg, var(--bg-1), var(--bg-2), var(--bg-3), var(--bg-1));
            background-size: 300% 300%;
            animation: siteBG 15s ease infinite;
            color: #ffffff;
            overflow-x: hidden;
        }

        h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 10px;
            margin-bottom: 60px;
            font-weight: 900;
            text-shadow: 0 0 15px rgba(0, 170, 255, 0.4);
        }

        /* 2. GRIGLIA GIOCHI */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); 
            gap: 40px;
            width: 100%;
            max-width: 1200px;
            justify-items: center;
            padding: 20px;
        }

        /* 3. ANIMAZIONE E STILE GAME-CARD */
        @keyframes cardAnim {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .game-card {
            background: var(--card-gradient);
            background-size: 400% 400%;
            animation: cardAnim 6s ease infinite;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            width: 100%;
            max-width: 260px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
        }

        .game-card:hover {
            transform: translateY(-15px) scale(1.03);
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .game-title {
            display: block;
            font-size: 1.1rem;
            font-weight: 800;
            margin-bottom: 10px;
            color: #fff;
            text-shadow: 0 2px 8px rgba(0,0,0,0.7);
            text-transform: uppercase;
        }

        /* 4. NUOVA SEZIONE DESCRIZIONE */
        .game-description {
            font-size: 0.75rem;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.95);
            margin-bottom: 15px;
            text-align: left; /* Allineamento a sinistra per i punti elenco */
            background: rgba(0, 0, 0, 0.2); /* Sfondo leggero per leggibilità */
            padding: 10px;
            border-radius: 10px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        /* Immagine Quadrata */
        .game-card img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 15px;
            display: block;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            border: 1px solid rgba(0,0,0,0.3);
        }

        /* Pulsanti Download */
        .download-container {
            margin-top: 5px;
            padding-top: 15px;
            border-top: 2px solid rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .download-container a {
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            text-decoration: none;
            font-weight: 800;
            padding: 8px 18px;
            border-radius: 10px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .download-container a:hover {
            background: #fff;
            color: #000;
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(255,255,255,0.4);
        }

        .divider {
            color: rgba(0,0,0,0.3);
            font-weight: bold;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; letter-spacing: 5px; }
            .game-grid { gap: 30px; }
        }
    </style>
</head>
<body>

    <h1>LIBRARY</h1>

    <div class="game-grid" id="game-grid"></div>

    <script src="script.js"></script>
</body>
</html>
