<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <style>
        :root {
            --bg-1: #020205; --bg-2: #0a0a1a; --bg-3: #120520;
            --card-gradient: linear-gradient(-45deg, #ff0055, #8800ff, #0088ff, #00ffee, #ff8800);
        }

        @keyframes siteBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes cardAnim { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 60px 20px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
            background: linear-gradient(-45deg, var(--bg-1), var(--bg-2), var(--bg-3), var(--bg-1));
            background-size: 300% 300%;
            animation: siteBG 15s ease infinite;
            color: #fff; overflow-x: hidden;
        }

        h1 { font-size: 2.5rem; text-transform: uppercase; letter-spacing: 10px; margin-bottom: 60px; font-weight: 900; }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); 
            gap: 40px; width: 100%; max-width: 1200px; justify-items: center;
        }

        .game-card {
            background: var(--card-gradient); background-size: 400% 400%;
            animation: cardAnim 6s ease infinite;
            border-radius: 20px; padding: 20px; text-align: center;
            width: 100%; max-width: 260px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .game-card:hover { transform: translateY(-15px) scale(1.03); }

        .game-title { display: block; font-size: 1.1rem; font-weight: 800; margin-bottom: 15px; text-transform: uppercase; }

        .game-card img {
            width: 100%; aspect-ratio: 1 / 1; object-fit: cover;
            border-radius: 12px; display: block;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }

        /* Stile descrizione sotto l'immagine */
        .game-description {
            font-size: 0.75rem; line-height: 1.5;
            color: #fff; text-align: left;
            background: rgba(0, 0, 0, 0.3);
            padding: 12px; border-radius: 10px;
            margin: 15px 0; /* Spazio sopra e sotto */
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        .download-container {
            padding-top: 15px; border-top: 2px solid rgba(0,0,0,0.1);
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }

        .download-container a {
            background: rgba(0, 0, 0, 0.6); color: #fff; text-decoration: none;
            font-weight: 800; padding: 8px 18px; border-radius: 10px;
            font-size: 0.85rem; text-transform: uppercase; transition: 0.3s;
            backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.1);
        }

        .download-container a:hover { background: #fff; color: #000; transform: scale(1.1); }
        .divider { color: rgba(0,0,0,0.3); font-weight: bold; }
    </style>
</head>
<body>
    <h1>LIBRARY</h1>
    <div class="game-grid" id="game-grid"></div>
    <script src="script.js"></script>
</body>
</html>
