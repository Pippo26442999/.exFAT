<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pippo26442999 Library</title>
    <style>
        :root {
            --bg-1: #020205;
            --bg-2: #0a0a1a; --bg-3: #120520;
            --dmca-red: #ff0033; --cyan-neon: #00ffee; --green-neon: #39ff14;
            --kofi-color: #29abe0;
            --p1: rgba(255, 0, 85, 0.4);
            --p2: rgba(136, 0, 255, 0.3); --p3: rgba(0, 255, 238, 0.3);
        }

        @keyframes siteBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes liquidGlow { 0% { transform: translate(-15%, -15%); } 50% { transform: translate(10%, 10%); } 100% { transform: translate(-15%, -15%); } }
        
        @keyframes pulseRed { 
            0% { opacity: 0.3; text-shadow: 0 0 0px transparent; transform: scale(1); } 
            50% { opacity: 1; text-shadow: 0 0 15px var(--dmca-red), 0 0 30px var(--dmca-red); transform: scale(1.08); } 
            100% { opacity: 0.3; text-shadow: 0 0 0px transparent; transform: scale(1); } 
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0; 
            padding: 160px 20px 60px 20px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; color: #fff; overflow-x: hidden;
            background: linear-gradient(-45deg, var(--bg-1), var(--bg-2), var(--bg-3), var(--bg-1));
            background-size: 300% 300%; animation: siteBG 15s ease infinite;
        }

        /* --- NAVBAR --- */
        nav { 
            display: flex;
            gap: 40px; align-items: center; 
            position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
            padding: 30px 50px;
            transition: all 0.5s ease;
            background: transparent; justify-content: center;
        }
        nav.scrolled {
            padding: 15px 50px;
            background: rgba(2, 2, 5, 0.9);
            backdrop-filter: blur(20px); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* --- CUSTOM DROPDOWN --- */
        .custom-dropdown {
            position: relative;
            user-select: none;
            min-width: 130px;
            z-index: 10002;
        }
        .dropdown-trigger {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--cyan-neon);
            color: var(--cyan-neon);
            padding: 8px 15px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 900;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        .dropdown-trigger:hover {
            background: rgba(0, 255, 238, 0.1);
            box-shadow: 0 0 15px rgba(0, 255, 238, 0.3);
        }
        .dropdown-trigger .arrow { font-size: 0.7rem;
            margin-left: 10px; transition: transform 0.3s ease; }
        .custom-dropdown.active .arrow { transform: rotate(180deg);
        }

        .dropdown-options {
            position: absolute;
            top: calc(100% + 10px);
            left: 0;
            right: 0;
            background: rgba(10, 10, 26, 0.95);
            border: 1px solid rgba(0, 255, 238, 0.3);
            border-radius: 15px;
            overflow: hidden;
            display: none;
            flex-direction: column;
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            max-height: 300px;
            overflow-y: auto;
            animation: slideDown 0.3s ease forwards;
        }
        .dropdown-options.show { display: flex;
        }
        .option {
            padding: 12px 15px;
            font-size: 0.85rem;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .option:hover { background: var(--cyan-neon); color: #000; font-weight: 800;
        }

        /* --- BOTTONI E NAV ITEMS --- */
        #kofi-nav-btn {
            display: flex;
            align-items: center; gap: 8px;
            background: var(--kofi-color) !important; color: white !important; text-decoration: none;
            padding: 8px 16px; border-radius: 50px; font-weight: 800;
            font-size: 0.9rem;
            transition: all 0.3s ease-in-out !important;
            opacity: 0; transform: translateX(50px) scale(0); pointer-events: none;
            position: absolute; right: 50px;
            border: none !important;
        }
        nav.scrolled #kofi-nav-btn { opacity: 1; transform: translateX(0) scale(1);
            pointer-events: auto; }
        #kofi-nav-btn:hover { transform: translateY(-3px) scale(1.05) !important;
            box-shadow: 0 0 15px var(--kofi-color); filter: brightness(1.2); }

        .nav-item { font-size: 2.5rem;
            text-transform: uppercase; letter-spacing: 10px; font-weight: 900; color: #fff; text-decoration: none; cursor: pointer; opacity: 0.4; transition: 0.4s; z-index: 10000;
        }
        nav.scrolled .nav-item { font-size: 1.8rem; letter-spacing: 6px;
        }
        .nav-item.active { opacity: 1; text-shadow: 0 0 20px var(--cyan-neon);
        }
        #dmca-link { animation: pulseRed 2s infinite ease-in-out; color: var(--dmca-red) !important;
            opacity: 1 !important; }

        .search-wrapper { display: flex; align-items: center; z-index: 10001;
            gap: 15px; }
        .search-icon { font-size: 2rem; cursor: pointer; opacity: 0.6;
        }
        #search-input { width: 0; padding: 0; border: none; outline: none;
            background: rgba(255, 255, 255, 0.1); color: #fff; border-bottom: 2px solid var(--cyan-neon); font-size: 1.2rem; transition: width 0.4s; visibility: hidden;
        }
        #search-input.active { width: 200px; padding: 5px 10px; visibility: visible;
        }

        /* --- CAROSELLO POPULAR - DRAG & DROP + SCROLL AUTOMATICO --- */
        .popular-section {
            width: 100%; max-width: 1400px; margin-bottom: 60px; display: none; flex-direction: column;
            position: relative;
        }
        .popular-title {
            font-weight: 900; text-transform: uppercase; color: var(--cyan-neon); letter-spacing: 3px; font-size: 1.8rem; margin-bottom: 20px; text-shadow: 0 0 15px var(--cyan-neon);
        }
        
        .carousel-container {
            width: 100%;
            overflow-x: hidden;
            position: relative;
            cursor: grab;
            user-select: none;
            touch-action: pan-y pinch-zoom;
        }
        
        .carousel-container:active {
            cursor: grabbing;
        }
        
        .carousel-track {
            display: flex;
            gap: 25px;
            width: max-content;
            transition: transform 0.3s ease-out;
            will-change: transform;
        }
        
        /* Sfumatura ai bordi */
        .carousel-container {
            mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
        }
        
        /* Card orizzontale - Solo l'immagine si anima, la card rimane ferma */
        .popular-card {
            width: 550px;
            height: 380px;
            flex-shrink: 0;
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            cursor: pointer;
            pointer-events: auto;
            transition: box-shadow 0.4s ease;
        }

        .popular-card:hover {
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .popular-card-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: transform 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border-radius: inherit;
        }

        .popular-card:hover .popular-card-bg {
            transform: scale(1.1);
        }

        .popular-card-gradient {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background: linear-gradient(to top, 
                rgba(0,0,0,0.85) 0%,
                rgba(0,0,0,0.3) 50%,
                transparent 100%);
            z-index: 1;
            pointer-events: none;
            border-radius: inherit;
        }
        
        .popular-card-content {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 2;
            padding: 20px;
        }
        
        .popular-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .popular-game-title {
            font-weight: 900;
            text-transform: uppercase;
            font-size: 1.2rem;
            letter-spacing: 1px;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            max-width: 65%;
            line-height: 1.3;
        }
        
        .popular-size {
            background: rgba(0, 255, 238, 0.9);
            color: #000;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 900;
            white-space: nowrap;
            box-shadow: 0 0 8px rgba(0, 255, 238, 0.5);
        }
        
        .update-badge-popular {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--green-neon);
            color: #000;
            padding: 4px 12px;
            border-radius: 15px;
            font-weight: 900;
            font-size: 0.7rem;
            z-index: 10;
            box-shadow: 0 0 12px var(--green-neon);
            animation: pulseRed 1.5s infinite;
        }
        
        /* Click hint in alto a sinistra */
        .click-hint {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0,0,0,0.6);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.65rem;
            color: var(--cyan-neon);
            z-index: 3;
            backdrop-filter: blur(4px);
            font-weight: 700;
        }

        /* --- MODALE POPUP MODERNO --- */
        .game-modal {
            display: none;
            position: fixed;
            z-index: 30000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px);
            animation: fadeIn 0.3s ease;
        }
        
        .game-modal-content {
            position: relative;
            background: linear-gradient(135deg, rgba(10,10,26,0.98), rgba(2,2,5,0.98));
            margin: 5% auto;
            width: 90%;
            max-width: 900px;
            border-radius: 30px;
            border: 1px solid var(--cyan-neon);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: slideUp 0.4s ease;
            max-height: 85vh;
            overflow-y: auto;
            scrollbar-width: none;
        }
        
        .game-modal-content::-webkit-scrollbar {
            display: none;
        }
        
        .modal-header {
            position: relative;
            height: 250px;
            background-size: cover;
            background-position: center;
            border-radius: 30px 30px 0 0;
        }
        
        .modal-header-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(0,0,0,0.5), rgba(0,0,0,0.8));
            border-radius: 30px 30px 0 0;
        }
        
        .modal-header-content {
            position: relative;
            z-index: 2;
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        
        .modal-title {
            font-size: 1.8rem;
            font-weight: 900;
            text-transform: uppercase;
            background: linear-gradient(135deg, #fff, var(--cyan-neon));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
        }
        
        .modal-close {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            font-size: 1.8rem;
            cursor: pointer;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .modal-close:hover {
            background: var(--dmca-red);
            transform: rotate(90deg);
        }
        
        .modal-body {
            padding: 30px;
        }
        
        .modal-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 25px;
        }
        
        .modal-tag {
            background: rgba(0, 255, 238, 0.15);
            border: 1px solid var(--cyan-neon);
            color: var(--cyan-neon);
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
        }
        
        .modal-info {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        
        .modal-info-item {
            background: rgba(255,255,255,0.05);
            padding: 10px 20px;
            border-radius: 15px;
        }
        
        .modal-info-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--cyan-neon);
            display: block;
        }
        
        .modal-info-value {
            font-size: 1rem;
            font-weight: 700;
            margin-top: 5px;
        }
        
        .modal-section {
            margin-bottom: 25px;
        }
        
        .modal-section-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--cyan-neon);
            margin-bottom: 12px;
            letter-spacing: 2px;
        }
        
        .modal-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .modal-btn {
            background: rgba(0, 255, 238, 0.85);
            color: #000;
            padding: 12px 25px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 900;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            display: inline-block;
            cursor: pointer;
            border: none;
        }
        
        .modal-btn:hover {
            background: #fff;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 238, 0.4);
        }
        
        .modal-credits {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 15px;
            font-size: 0.85rem;
            margin-top: 20px;
        }

        /* --- GRIGLIA E CARD STANDARD --- */
        .game-grid { display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 40px; width: 100%; max-width: 1400px;
        }
        .game-card {
            background: rgba(5, 5, 10, 0.7);
            border-radius: 30px; padding: 35px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; flex-direction: column; align-items: center; position: relative;
            overflow: hidden; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .game-card:hover { transform: translateY(-10px) scale(1.02);
            background: rgba(10, 10, 20, 0.85); border-color: rgba(255, 255, 255, 0.3); box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        .game-card::before {
            content: "";
            position: absolute; top: -40%; left: -40%; width: 180%; height: 180%;
            background: radial-gradient(circle at center, var(--p1) 0%, var(--p2) 30%, var(--p3) 50%, transparent 75%);
            filter: blur(60px); animation: liquidGlow 8s ease-in-out infinite;
            z-index: 1; pointer-events: none;
        }

        .game-size {
            position: absolute;
            bottom: 15px; right: 15px; 
            background: rgba(0, 255, 238, 0.65); color: #000; 
            padding: 4px 10px; border-radius: 8px; font-size: 0.75rem;
            font-weight: 900;
            border: 1px solid #fff; backdrop-filter: blur(5px);
            z-index: 15; box-shadow: 0 0 10px rgba(0, 255, 238, 0.5);
        }

        .game-title, .image-container, .download-section { position: relative; z-index: 5; width: 100%;
        }
        .game-title { font-weight: 900; text-align: center; text-transform: uppercase; font-size: 1.2rem; min-height: 2.5rem;
            margin-bottom: 15px; letter-spacing: 1px; }

        .image-container { border-radius: 20px; overflow: hidden; aspect-ratio: 1/1;
            margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); background: #000; }
        .image-container img { width: 100%;
            height: 100%; object-fit: cover; display: block; transition: transform 0.6s; }
        .game-card:hover .image-container img { transform: scale(1.1) rotate(2deg);
        }

        .tags-overlay { position: absolute; bottom: 15px; left: 15px; display: flex; flex-direction: column;
            gap: 8px; z-index: 10; }
        .game-tag { background: rgba(0,0,0,0.8); color: #fff; font-size: 0.75rem;
            padding: 6px 14px; border-radius: 8px; font-weight: 800; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(4px);
        }

        .ver-label { font-size: 0.85rem; font-weight: 900; margin: 18px 0 8px 0;
            color: #fff; text-transform: uppercase; letter-spacing: 1px; }
        .download-container { display: flex; gap: 12px;
            width: 100%; }
        
        .btn-dl { 
            display: block !important;
            text-decoration: none !important; color: #ffffff !important; 
            background: rgba(255, 255, 255, 0.1) !important; padding: 16px 0 !important; 
            border-radius: 14px !important;
            font-size: 0.9rem !important; font-weight: 900 !important; 
            transition: all 0.25s ease-in-out !important; cursor: pointer !important; 
            flex: 1; text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2) !important; 
            position: relative; z-index: 20 !important;
        }
        .btn-dl:hover { background: #ffffff !important; color: #000000 !important; transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(255, 255, 255, 0.6); }

        .pagination { display: flex;
            gap: 20px; margin-top: 50px; align-items: center; position: relative; z-index: 100;
        }
        .page-btn { background: rgba(2, 2, 5, 0.8); border: 1px solid var(--cyan-neon);
            color: var(--cyan-neon); padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: 900; transition: 0.3s;
        }
        .page-btn:hover:not(:disabled) { background: var(--cyan-neon); color: #000; box-shadow: 0 0 15px var(--cyan-neon);
        }
        .page-btn:disabled { opacity: 0.3; cursor: not-allowed;
        }

        /* --- MODALI CREDITS --- */
        .modal { display: none;
            position: fixed; z-index: 20000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
        }
        .modal-content { background: #0a0a1a; margin: 8% auto; padding: 40px; border-radius: 30px;
            position: relative; width: 90%; max-width: 500px; border: 2px solid var(--cyan-neon); text-align: center;
        }
        .close-modal { position: absolute; right: 25px; top: 20px; color: #fff; font-size: 32px;
            cursor: pointer; z-index: 20001; }

        #site-lock-overlay { position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(2, 2, 5, 0.8); backdrop-filter: blur(25px); z-index: 999999; display: flex; justify-content: center; align-items: center;
        }
        .lock-box { background: #0a0a1a; padding: 45px; border-radius: 35px; border: 2px solid var(--cyan-neon);
            text-align: center; max-width: 400px; width: 90%; box-shadow: 0 0 50px rgba(0, 255, 238, 0.2);
        }

        /* --- FIX Z-INDEX PER MODALI --- */
        /* Assicura che il modal dei crediti sia sopra il game modal */
        #credits-modal {
            z-index: 40000 !important;
        }

        #credits-modal .modal-content {
            z-index: 40001 !important;
        }

        /* Assicura che il game modal sia sotto */
        .game-modal {
            z-index: 30000 !important;
        }

        @media (max-width: 768px) {
            .popular-card {
                width: 420px;
                height: 340px;
            }
            .popular-game-title {
                font-size: 1rem;
            }
            .modal-title {
                font-size: 1.3rem;
            }
            .modal-header {
                height: 180px;
            }
        }
    </style>
</head>
<body>
    <div id="site-lock-overlay">
        <div id="lock-box" class="lock-box">
            <h2 style="color: var(--cyan-neon); text-transform: uppercase; margin-bottom: 15px; letter-spacing: 3px; font-weight: 900;">Access Denied</h2>
            <input type="password" id="site-pw-input" placeholder="Enter Password" 
                   onkeydown="if(event.key==='Enter') checkSitePassword()"
                   style="width: 100%; padding: 18px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #fff; text-align: center; font-size: 1.2rem; margin-bottom: 25px; outline: none; box-sizing: border-box;">
            <button onclick="checkSitePassword()" style="width: 100%; padding: 18px; border-radius: 15px; border: none; background: var(--cyan-neon); color: #000; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;">Unlock Site</button>
            <p id="pw-error" style="color: var(--dmca-red); margin-top: 20px; font-size: 0.85rem; display: none; font-weight: 700;">Invalid Password.</p>
        </div>
    </div>

    <nav id="main-nav">
        <div class="search-wrapper">
            <span class="search-icon" id="search-trigger">🔍</span>
            <input type="text" id="search-input" placeholder="Search game...">
            
            <div class="custom-dropdown" id="fw-dropdown">
                <div class="dropdown-trigger">
                    <span id="fw-current">FW: All</span>
                    <span class="arrow">▼</span>
                </div>
                <div class="dropdown-options" id="fw-options">
                    <div class="option" data-value="99">FW: All</div>
                    <div class="option" data-value="1">1.xx</div>
                    <div class="option" data-value="2">2.xx</div>
                    <div class="option" data-value="3">3.xx</div>
                    <div class="option" data-value="4">4.xx</div>
                    <div class="option" data-value="5">5.xx</div>
                    <div class="option" data-value="6">6.xx</div>
                    <div class="option" data-value="7">7.xx</div>
                    <div class="option" data-value="8">8.xx</div>
                    <div class="option" data-value="9">9.xx</div>
                    <div class="option" data-value="10">10.xx</div>
