<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Archive</title>
    <style>
        /* Modern Dark Theme */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #eeeeee;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-bottom: 40px;
            font-size: 2rem;
            color: #00ffcc;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* Grid Layout */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1100px;
        }

        /* Game Card Style */
        .card {
            background-color: #1e1e1e;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            border: 1px solid #333;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: #00ffcc;
        }

        /* 1. Name/Title on top */
        .title {
            display: block;
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 12px;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 2. Image in the middle (from .exFAT folder) */
        .card img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 12px;
            background-color: #2a2a2a; /* Placeholder color */
        }

        /* 3. Links at the bottom */
        .links {
            font-size: 0.9rem;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #333;
        }

        .links a {
            color: #00ffcc;
            text-decoration: none;
            font-weight: bold;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .sep {
            color: #666;
            margin: 0 5px;
        }

        .footer {
            margin-top: 60px;
            font-size: 0.8rem;
            color: #555;
        }
    </style>
</head>
<body>

    <h1>Game Collection</h1>

    <div class="container">

        <div class="card">
            <span class="title">Game Name 1</span>
            <img src=".exFAT/immagine1.jpg" alt="Game 1">
            <div class="links">
                <a href="LINK_HERE" target="_blank">Akia</a>
                <span class="sep">-</span>
                <a href="LINK_HERE" target="_blank">Viki</a>
            </div>
        </div>
        <div class="card">
            <span class="title">Game Name 2</span>
            <img src=".exFAT/immagine2.jpg" alt="Game 2">
            <div class="links">
                <a href="#" target="_blank">Akia</a>
                <span class="sep">-</span>
                <a href="#" target="_blank">Viki</a>
            </div>
        </div>
        </div>

    <div class="footer">
        Hosted on GitHub Pages
    </div>

</body>
</html>
