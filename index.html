<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Library</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        :root {
            --bg-1: #020205; --bg-2: #0a0a1a; --bg-3: #120520;
            --card-gradient: linear-gradient(-45deg, #ff0055, #8800ff, #0088ff, #00ffee, #ff8800);
            --dmca-red: #ff0033;
            --cyan-neon: #00ffee;
            --green-neon: #39ff14;
        }

        @keyframes siteBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes cardAnim { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes pulseRed { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; text-shadow: 0 0 20px var(--dmca-red); color: #ff4d4d; } }

        body {
            font-family: 'Segoe UI', sans-serif; margin: 0; padding: 40px 20px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; color: #fff; overflow-x: hidden;
            background: linear-gradient(-45deg, var(--bg-1), var(--bg-2), var(--bg-3), var(--bg-1));
            background-size: 300% 300%; animation: siteBG 15s ease infinite;
        }

        nav { display: flex; gap: 40px; margin-bottom: 60px; align-items: center; }
        .search-wrapper { display: flex; align-items: center; }
        .search-icon { font-size: 2rem; cursor: pointer; opacity: 0.6; transition: 0.3s; margin-right: 10px; }
        #search-input {
            width: 0; padding: 0; border: none; outline: none; background: rgba(255, 255, 255, 0.1);
            color: #fff; border-bottom: 2px solid var(--cyan-neon); font-size: 1.2rem; transition: width 0.4s;
        }
        #search-input.active { width: 200px; padding: 5px 10px; }

        .nav-item { font-size: 2.5rem; text-transform: uppercase; letter-spacing: 10px; font-weight: 900; color: #fff; text-decoration: none; cursor: pointer; opacity: 0.4; }
        .nav-item.active { opacity: 1; text-shadow: 0 0 20px rgba(0, 170, 255, 0.8); }
        #dmca-link { animation: pulseRed 2s infinite ease-in-out; opacity: 1; }

        .game-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); 
            gap: 40px; width: 100%; max-width: 1400px; 
        }

        .game-card {
            background: var(--card-gradient); background-size: 400% 400%; animation: cardAnim 6s ease infinite;
            border-radius: 30px; padding: 35px; border: 1px solid rgba(255, 255, 255, 0.2);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            display: flex; flex-direction: column; align-items: center;
        }

        /* RIPRISTINATO: Effetto sollevamento al passaggio del mouse */
        .game-card:hover { 
            transform: translateY(-15px) scale(1.02); 
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            border-color: rgba(255,255,255,0.5);
        }

        .game-title { display: block; margin-bottom: 25px; font-weight: 900; text-align: center; text-transform: uppercase; font-size: 1.2rem; min-height: 3rem; }
        .image-container { position: relative; border-radius: 20px; overflow: hidden; aspect-ratio: 1/1; width: 100%; margin-bottom: 25px; }
        .image-container img { width: 100%; height: 100%; object-fit: cover; }
        .tags-overlay { position: absolute; bottom: 15px; left: 15px; display: flex; flex-direction: column; gap: 8px; }
        .game-tag { background: rgba(0,0,0,0.8); color: #fff; font-size: 0.75rem; padding: 6px 14px; border-radius: 8px; font-weight: 800; border: 1px solid rgba(255,255,255,0.1); }

        .download-section { width: 100%; display: flex; flex-direction: column; }
        .ver-label { font-size: 0.85rem; font-weight: 800; margin: 10px 0 5px 0; color: rgba(255,255,255,0.9); text-transform: uppercase; text-align: left; }
        .download-container { display: flex; gap: 15px; width: 100%; }
        .download-container.vertical { flex-direction: column; gap: 10px; margin-top: 15px; }

        .btn-dl { 
            text-decoration: none; color: #fff; background: #1a1a1a; 
            padding: 12px 0; border-radius: 15px; font-size: 1rem; font-weight: 900; 
            transition: 0.3s; cursor: pointer; flex: 1; text-align: center;
        }
        .btn-dl:hover { background: #fff; color: #000; box-shadow: 0 0 20px rgba(255,255,255,0.3); }

        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); }
        .modal-content { background: #0a0a1a; margin: 10% auto; padding: 40px; border-radius: 30px; position: relative; width: 90%; max-width: 500px; border: 2px solid var(--cyan-neon); text-align: center; }
        .close-modal { position: absolute; right: 25px; top: 20px; color: #fff; font-size: 32px; cursor: pointer; }
        
        .password-note {
            margin: 25px 0; padding: 20px; border-radius: 15px; border: 2px dashed var(--green-neon);
            color: var(--green-neon); cursor: pointer; min-height: 80px; display: flex; justify-content: center; align-items: center;
        }
        .pw-text-revealed { display: none; font-size: 1.6rem; font-weight: 900; letter-spacing: 3px; }
    </style>
</head>
<body>
    <nav>
        <div class="search-wrapper">
            <span class="search-icon" id="search-trigger">🔍</span>
            <input type="text" id="search-input" placeholder="Search game...">
        </div>
        <div class="nav-item active">Library</div>
        <div class="nav-item" id="dmca-link">DMCA</div>
    </nav>

    <div class="game-grid" id="game-grid"></div>

    <div id="credits-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="close-credits">&times;</span>
            <h2 style="color: var(--cyan-neon); text-transform: uppercase;">Download</h2>
            <div id="credits-body" style="color: #ccc; margin-bottom: 20px;"></div>
            <div class="password-note" onclick="revealPassword()">
                <span id="pw-instruction" style="font-weight: 800;">CLICK HERE TO SHOW PASSWORD</span>
                <span id="pw-final" class="pw-text-revealed">pippo</span>
            </div>
            <a id="final-download-btn" target="_blank" class="btn-dl" style="background: var(--cyan-neon); color: #000; width: 100%; display: inline-block;">PROCEED TO DOWNLOAD</a>
        </div>
    </div>

    <div id="dmca-modal" class="modal">
        <div class="modal-content" style="border-color: var(--dmca-red);">
            <span class="close-modal" id="close-dmca">&times;</span>
            <h2 id="dmca-title" style="color: var(--dmca-red); text-transform: uppercase;"></h2>
            <div id="dmca-body" style="color: #eee; text-align: left; line-height: 1.6;"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
