<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archivio Giochi - GitHub Pages</title>
    <style>
        /* Stile Generale */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f0f0f;
            color: #ffffff;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-bottom: 40px;
            font-size: 2.5rem;
            color: #00d4ff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Griglia dei giochi */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1200px;
        }

        /* Card del singolo gioco */
        .game-card {
            background-color: #1e1e1e;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s ease;
            border: 1px solid #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .game-card:hover {
            transform: translateY(-10px);
            border-color: #00d4ff;
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.2);
        }

        /* Nome Titolo Sopra */
        .game-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
            display: block;
            color: #eeeeee;
        }

        /* Immagine dentro cartella Giochi */
        .game-card img {
            width: 100%;
            aspect-ratio: 2/3; /* Formato poster standard */
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
            background-color: #333; /* Placeholder se l'immagine manca */
        }

        /* Sezione Link Download */
        .download-container {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #333;
            font-size: 0.95rem;
        }

        .download-container a {
            color: #00d4ff;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .download-container a:hover {
            color: #ffffff;
            text-decoration: underline;
        }

        .divider {
            color: #555;
            margin: 0 8px;
        }

        /* Messaggio se non ci sono ancora giochi */
        .footer {
            margin-top: 50px;
            color: #666;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <h1>🎮 La Mia Raccolta</h1>

    <div class="game-grid">

        <div class="game-card">
            <span class="game-title">Nome Titolo 1</span>
            <img src="Giochi/immagine1.jpg" alt="Gioco 1">
            <div class="download-container">
                <a href="LINK_AKIA_QUI" target="_blank">Akia</a>
                <span class="divider">-</span>
                <a href="LINK_VIKI_QUI" target="_blank">Viki</a>
            </div>
        </div>
        <div class="game-card">
            <span class="game-title">Nome Titolo 2</span>
            <img src="Giochi/immagine2.png" alt="Gioco 2">
            <div class="download-container">
                <a href="#" target="_blank">Akia</a>
                <span class="divider">-</span>
                <a href="#" target="_blank">Viki</a>
            </div>
        </div>
        </div>

    <div class="footer">
        Creato con GitHub Pages
    </div>

</body>
</html>
